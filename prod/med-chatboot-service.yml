server:
  port: 8084

spring:
  ai:
    model:
      chat: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3}
        temperature: ${OLLAMA_CHAT_TEMPERATURE:0.4}

medback:
  chatbot:
    system-prompt: >
      You are an expert medical AI assistant helping a doctor. Provide concise,
      professional, and accurate medical insights based strictly on the provided
      symptoms.

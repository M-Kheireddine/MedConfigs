spring:
  cloud:
    config:
      enabled: true
    discovery:
      enabled: true

server:
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway, metrics, prometheus

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}